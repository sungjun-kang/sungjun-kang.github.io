<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배당 포트폴리오 복리 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #0b5e71;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --border: #e0e5ec;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* 각 계산기 카드 스타일 */
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--primary);
        }
        .card.total-card {
            grid-column: 1 / -1; /* 합산 카드는 전체 너비 사용 */
            border-top: 5px solid #d35400; /* 포인트 색상 */
        }
        .card h2 { margin-top: 0; color: var(--primary); font-size: 20px; text-align: center; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .total-card h2 { color: #d35400; }

        /* 입력 폼 */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 4px; }
        input { padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; }
        
        button {
            width: 100%; padding: 12px; background-color: var(--primary); color: white;
            border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer;
            margin-bottom: 20px; transition: background 0.3s;
        }
        button:hover { background-color: #084655; }
        .total-card button { background-color: #d35400; }
        .total-card button:hover { background-color: #a04000; }

        /* 차트 및 테이블 */
        .chart-container { width: 100%; height: 250px; margin-bottom: 20px; }
        .table-container { max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; }
        th, td { padding: 8px; border-bottom: 1px solid var(--border); }
        th { background-color: var(--primary); color: white; position: sticky; top: 0; }
        .total-card th { background-color: #d35400; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .summary-box { background: #e8f8f5; padding: 10px; border-radius: 6px; text-align: center; margin-bottom: 15px; font-weight: bold; color: #117a65; }
        .total-card .summary-box { background: #fdf2e9; color: #ba4a00; }
    </style>
</head>
<body>

    <h1>📊 분기별 배당 포트폴리오 복리 대시보드</h1>

    <div class="dashboard">
        <div class="card">
            <h2>1, 4, 7, 10월 배당주</h2>
            <div class="input-grid">
                <div class="input-group"><label>종목명</label><input type="text" id="name1" value="알트리아"></div>
                <div class="input-group"><label>현재 주식수 (주)</label><input type="number" id="shares1" value="308"></div>
                <div class="input-group"><label>현재 1주당 주가 ($)</label><input type="number" id="price1" value="45.00"></div>
                <div class="input-group"><label>저번 분기 받은 총 배당금 ($)</label><input type="number" id="prevDiv1" value="301.84"></div>
            </div>
            <div id="summary1" class="summary-box" style="display:none;"></div>
            <div class="chart-container"><canvas id="chart1"></canvas></div>
            <div class="table-container">
                <table id="table1" style="display:none;">
                    <thead><tr><th>연차</th><th>주식수 (재투자)</th><th>해당 연도 총 배당금</th></tr></thead>
                    <tbody id="tbody1"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>2, 5, 8, 11월 배당주</h2>
            <div class="input-grid">
                <div class="input-group"><label>종목명</label><input type="text" id="name2" value="버라이존"></div>
                <div class="input-group"><label>현재 주식수 (주)</label><input type="number" id="shares2" value="360"></div>
                <div class="input-group"><label>현재 1주당 주가 ($)</label><input type="number" id="price2" value="40.00"></div>
                <div class="input-group"><label>저번 분기 받은 총 배당금 ($)</label><input type="number" id="prevDiv2" value="243.00"></div>
            </div>
            <div id="summary2" class="summary-box" style="display:none;"></div>
            <div class="chart-container"><canvas id="chart2"></canvas></div>
            <div class="table-container">
                <table id="table2" style="display:none;">
                    <thead><tr><th>연차</th><th>주식수 (재투자)</th><th>해당 연도 총 배당금</th></tr></thead>
                    <tbody id="tbody2"></tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>3, 6, 9, 12월 배당주</h2>
            <div class="input-grid">
                <div class="input-group"><label>종목명</label><input type="text" id="name3" value="SCHD"></div>
                <div class="input-group"><label>현재 주식수 (주)</label><input type="number" id="shares3" value="7"></div>
                <div class="input-group"><label>현재 1주당 주가 ($)</label><input type="number" id="price3" value="80.00"></div>
                <div class="input-group"><label>저번 분기 받은 총 배당금 ($)</label><input type="number" id="prevDiv3" value="5.25"></div>
            </div>
            <div id="summary3" class="summary-box" style="display:none;"></div>
            <div class="chart-container"><canvas id="chart3"></canvas></div>
            <div class="table-container">
                <table id="table3" style="display:none;">
                    <thead><tr><th>연차</th><th>주식수 (재투자)</th><th>해당 연도 총 배당금</th></tr></thead>
                    <tbody id="tbody3"></tbody>
                </table>
            </div>
        </div>

        <div class="card total-card">
            <h2>🌟 포트폴리오 전체 합산 (30년 복리)</h2>
            <button onclick="calculateAll()">전체 포트폴리오 계산 및 차트 업데이트</button>
            <div id="summaryTotal" class="summary-box" style="display:none;"></div>
            <div class="chart-container" style="height: 350px;"><canvas id="chartTotal"></canvas></div>
            <div class="table-container" style="max-height: 300px;">
                <table id="tableTotal" style="display:none;">
                    <thead><tr><th>연차</th><th>포트폴리오 연간 총 배당금 ($)</th><th>월 평균 배당금 ($)</th></tr></thead>
                    <tbody id="tbodyTotal"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let charts = {}; // 차트 인스턴스 저장용

        function calculateGroup(shares, price, prevDiv) {
            let currentShares = parseFloat(shares);
            let currentPrice = parseFloat(price);
            let divPerShare = parseFloat(prevDiv) / currentShares; // 1주당 분기 배당금 산출
            
            let yearlyData = [];
            
            for (let year = 1; year <= 30; year++) {
                let yearTotalDiv = 0;
                // 1년 = 4분기 복리 적용 (배당받고 -> 그 돈으로 주식 사고 -> 다음 분기 배당 늘어남)
                for (let q = 1; q <= 4; q++) {
                    let quarterDiv = currentShares * divPerShare; // 이번 분기 받을 배당금
                    yearTotalDiv += quarterDiv;
                    currentShares += (quarterDiv / currentPrice); // 배당 재투자(
