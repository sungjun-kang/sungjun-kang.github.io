<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배당금 복리 계산기</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            color: #333; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 30px; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #3498db; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background-color 0.3s;
            margin-top: 10px; 
        }
        button:hover { background-color: #2980b9; }
        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            background-color: #e8f8f5; 
            border: 1px solid #d1f2eb;
            border-radius: 8px; 
            text-align: center; 
            font-size: 18px; 
            color: #117a65; 
        }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: center; }
        th { background-color: #3498db; color: white; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
    </style>
</head>
<body>

    <h1>📈 배당금 30년 복리 계산기</h1>

    <div class="input-group">
        <label for="stockName">종목명 및 수량</label>
        <input type="text" id="stockName" placeholder="예: 알트리아 308주, 버라이존 360주..." value="브로드컴 230주">
    </div>

    <div class="input-group">
        <label for="currentDividend">현재 연간 총 배당금 ($)</label>
        <input type="number" id="currentDividend" placeholder="현재 1년간 받는 총 배당금을 입력하세요" value="1200">
    </div>

    <div class="input-group">
        <label for="growthRate">예상 연평균 배당 성장률 (%)</label>
        <input type="number" id="growthRate" placeholder="예: 8" value="10">
    </div>

    <button onclick="calculateDividend()">계산하기</button>

    <div id="nextQuarterBox" class="result-box" style="display: none;"></div>

    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>연차</th>
                <th>예상 연간 총 배당금 ($)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>

    <script>
        function calculateDividend() {
            const stockName = document.getElementById('stockName').value;
            const currentDividend = parseFloat(document.getElementById('currentDividend').value);
            const growthRate = parseFloat(document.getElementById('growthRate').value) / 100;

            if (isNaN(currentDividend) || isNaN(growthRate)) {
                alert("배당금과 성장률을 정확한 숫자로 입력해주세요.");
                return;
            }

            // 1. 다음 분기 배당금 계산 (연간 배당금의 1/4)
            const nextQuarter = currentDividend / 4;
            const nextQuarterBox = document.getElementById('nextQuarterBox');
            nextQuarterBox.style.display = 'block';
            nextQuarterBox.innerHTML = `💸 <strong>${stockName}</strong>의 다음 분기 예상 배당금<br><br><span style="font-size: 24px; font-weight: bold;">$${nextQuarter.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>`;

            // 2. 1~30년 복리 표 생성
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = ''; 
            
            let expectedDividend = currentDividend;

            for (let year = 1; year <= 30; year++) {
                expectedDividend += expectedDividend * growthRate; // 매년 배당 성장률만큼 복리 증가
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${year}년 후</strong></td>
                    <td>$${expectedDividend.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td>
                `;
                tableBody.appendChild(row);
            }

            // 결과 테이블 보여주기
            document.getElementById('resultTable').style.display = 'table';
        }
    </script>

</body>
</html>
