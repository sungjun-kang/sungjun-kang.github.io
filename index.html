<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1, 4, 7, 10월 배당주 복리 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-top: 5px solid #0b5e71;
        }
        h1 {
            text-align: center;
            color: #0b5e71;
            margin-bottom: 30px;
        }
        .input-area {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }
        label {
            font-size: 13px;
            font-weight: bold;
            color: #495057;
            margin-bottom: 5px;
        }
        input {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #0b5e71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
        }
        button:hover {
            background-color: #084655;
        }
        .chart-wrapper {
            width: 100%;
            height: 400px; /* 차트 크기 확보 */
            margin-bottom: 40px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            padding: 12px;
            border: 1px solid #dee2e6;
        }
        th {
            background-color: #0b5e71;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .highlight {
            background-color: #e3f2fd !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📉 1, 4, 7, 10월 배당 복리 계산기</h1>

        <div class="input-area">
            <div class="input-group">
                <label>주식명</label>
                <input type="text" id="stockName" value="알트리아">
            </div>
            <div class="input-group">
                <label>현재 주식수 (주)</label>
                <input type="number" id="stockShares" value="308">
            </div>
            <div class="input-group">
                <label>현재 주가 ($)</label>
                <input type="number" id="stockPrice" value="45.00">
            </div>
            <div class="input-group">
                <label>저번 분기 배당금 ($)</label>
                <input type="number" id="prevDiv" value="301.84">
            </div>
        </div>

        <button onclick="calculateDRIP()">계산 및 차트 출력</button>

        <div class="chart-wrapper">
            <canvas id="myChart"></canvas>
        </div>

        <table>
            <thead>
                <tr>
                    <th>기간</th>
                    <th>주식명</th>
                    <th>해당 시점 주식수 (재투자)</th>
                    <th>예상 배당금 ($)</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script>
        let myChartInstance = null;

        function calculateDRIP() {
            const name = document.getElementById('stockName').value;
            const initialShares = parseFloat(document.getElementById('stockShares').value);
            const price = parseFloat(document.getElementById('stockPrice').value);
            const prevDiv = parseFloat(document.getElementById('prevDiv').value);

            if (!name || isNaN(initialShares) || isNaN(price) || isNaN(prevDiv)) {
                alert("모든 칸에 올바른 값을 입력해주세요.");
                return;
            }

            const dps = prevDiv / initialShares; // 1주당 분기 배당금
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; // 기존 표 내용 초기화

            let chartLabels = [];
            let chartData = [];

            // 1. 현재 분기
            let currentShares = initialShares;
            let currentDiv = currentShares * dps;
            tbody.innerHTML += `<tr class="highlight"><td>현재 분기</td><td>${name}</td><td>${currentShares.toFixed(2)}주</td><td>$${currentDiv.toFixed(2)} (분기)</td></tr>`;

            // 2. 다음 예상 분기 (현재 분기 배당금으로 주식 추가 매수)
            let nextShares = currentShares + (currentDiv / price);
            let nextDiv = nextShares * dps;
            tbody.innerHTML += `<tr class="highlight"><td>다음 예상분기</td><td>${name}</td><td>${nextShares.toFixed(2)}주</td><td>$${nextDiv.toFixed(2)} (분기)</td></tr>`;

            // 3. 1년 후 ~ 30년 후 계산
            let runningShares = initialShares;
            for (let year = 1; year <= 30; year++) {
                let yearlyTotalDiv = 0;
                
                // 1년 = 4분기 복리 사이클
                for (let q = 1; q <= 4; q++) {
                    let quarterDiv = runningShares * dps;
                    yearlyTotalDiv += quarterDiv;
                    runningShares += (quarterDiv / price); // 배당 재투자
                }

                // 표에 데이터 추가
                tbody.innerHTML += `<tr><td>${year}년 후</td><td>${name}</td><td>${runningShares.toFixed(2)}주</td><td>$${yearlyTotalDiv.toFixed(2)} (연간 합계)</td></tr>`;
                
                // 차트 데이터 수집
                chartLabels.push(`${year}년`);
                chartData.push(yearlyTotalDiv);
            }

            // 4. 차트 그리기
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChartInstance) {
                myChartInstance.destroy(); // 기존 차트가 있으면 삭제하고 다시 그림
            }
            
            myChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: '연간 예상 배당금 ($)',
                        data: chartData,
                        backgroundColor: '#0b5e71',
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { callback: function(value) { return '$' + value.toLocaleString(); } }
                        }
                    }
                }
            });
        }

        // 페이지 로드 시 자동으로 한 번 계산
        window.onload = calculateDRIP;
    </script>
</body>
</html>
