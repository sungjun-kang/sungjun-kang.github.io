<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1, 4, 7, 10월 배당 복리 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-top: 5px solid #0b5e71;
        }
        h1 {
            text-align: center;
            color: #0b5e71;
            margin-bottom: 20px;
        }

        /* 차트 영역 최상단 배치 및 가로 스크롤 적용 */
        .chart-scroll-container {
            width: 100%;
            overflow-x: auto;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: #fff;
        }
        .chart-wrapper {
            min-width: 3000px; /* 120개 분기가 뭉개지지 않도록 강제 넓이 지정 */
            height: 400px;
            padding: 10px;
        }

        /* 입력 영역 */
        .input-area {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: #f1f3f5;
            padding: 20px;
            border-radius: 8px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }
        label {
            font-size: 13px;
            font-weight: bold;
            color: #495057;
            margin-bottom: 5px;
        }
        input {
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 15px;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #0b5e71;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
        }
        button:hover {
            background-color: #084655;
        }

        /* 테이블 영역 (스크롤 가능하게 처리) */
        .table-container {
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #dee2e6;
        }
        th {
            background-color: #0b5e71;
            color: white;
            position: sticky;
            top: 0;
            z-index: 1;
        }
        tr:nth-child(even) {
            background-color: #f8f9fa;
        }
        .highlight-current {
            background-color: #ffeaa7 !important;
            font-weight: bold;
        }
        .highlight-next {
            background-color: #81ecec !important;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📉 1, 4, 7, 10월 배당 복리 계산기</h1>

        <div class="chart-scroll-container">
            <div class="chart-wrapper">
                <canvas id="myChart"></canvas>
            </div>
        </div>

        <div class="input-area">
            <div class="input-group">
                <label>주식명</label>
                <input type="text" id="stockName" value="알트리아">
            </div>
            <div class="input-group">
                <label>현재 주식수 (주)</label>
                <input type="number" id="stockShares" value="308">
            </div>
            <div class="input-group">
                <label>현재 주가 ($)</label>
                <input type="number" id="stockPrice" value="45.00">
            </div>
            <div class="input-group">
                <label>저번 분기 배당금 ($)</label>
                <input type="number" id="prevDiv" value="301.84">
            </div>
        </div>

        <button onclick="calculateDRIP()">계산 및 차트/표 업데이트</button>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>기간 (분기별)</th>
                        <th>주식명</th>
                        <th>해당 시점 주식수 (재투자 반영)</th>
                        <th>분기 예상 배당금 ($)</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let myChartInstance = null;

        function calculateDRIP() {
            const name = document.getElementById('stockName').value;
            const initialShares = parseFloat(document.getElementById('stockShares').value);
            const price = parseFloat(document.getElementById('stockPrice').value);
            const prevDiv = parseFloat(document.getElementById('prevDiv').value);

            if (!name || isNaN(initialShares) || isNaN(price) || isNaN(prevDiv)) {
                alert("모든 칸에 올바른 숫자를 입력해주세요.");
                return;
            }

            const dps = prevDiv / initialShares; // 1주당 분기 배당금
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 

            let chartLabels = [];
            let chartData = [];
            let runningShares = initialShares;

            // 30년 * 4분기 = 120번 반복 (모든 분기 쪼개서 계산)
            for (let i = 1; i <= 120; i++) {
                // 이번 분기 배당금 계산
                let currentDiv = runningShares * dps;
                
                // 기간 라벨 생성
                let year = Math.ceil(i / 4);
                let quarter = i % 4 === 0 ? 4 : i % 4;
                let labelName = `${year}년차 ${quarter}분기`;
                
                let rowClass = "";
                if (i === 1) {
                    labelName = "현재 분기 (1년차 1분기)";
                    rowClass = "highlight-current";
                } else if (i === 2) {
                    labelName = "다음 예상분기 (1년차 2분기)";
                    rowClass = "highlight-next";
                }

                // 차트용 데이터 수집
                chartLabels.push(i === 1 ? "현재 분기" : i === 2 ? "다음 분기" : `${year}년 ${quarter}Q`);
                chartData.push(currentDiv);

                // 표에 데이터 추가
                tbody.innerHTML += `
                    <tr class="${rowClass}">
                        <td>${labelName}</td>
                        <td>${name}</td>
                        <td>${runningShares.toFixed(2)}주</td>
                        <td>$${currentDiv.toFixed(2)}</td>
                    </tr>
                `;

                // 배당금으로 주식 추가 매수 (복리 적용)
                runningShares += (currentDiv / price); 
            }

            // 4. 차트 그리기
            const ctx = document.getElementById('myChart').getContext('2d');
            if (myChartInstance) {
                myChartInstance.destroy(); 
            }
            
            myChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: '분기별 예상 배당금 ($)',
                        data: chartData,
                        backgroundColor: '#0b5e71',
                        borderRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { callback: function(value) { return '$' + value.toLocaleString(); } }
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ' $' + context.raw.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
                                }
                            }
                        }
                    }
                }
            });
        }

        // 페이지 로드 시 자동으로 한 번 계산
        window.onload = calculateDRIP;
    </script>
</body>
</html>
