<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실전 1, 4, 7, 10월 배당 복리 계산기</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px;
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-top: 5px solid #0b5e71;
        }
        h1 {
            text-align: center;
            color: #0b5e71;
            margin-bottom: 5px;
        }
        .info-text {
            text-align: center;
            color: #d35400;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Y축 고정 스크롤 차트 구현 (가장 중요) */
        .chart-scroll-container {
            position: relative;
            width: 100%;
            overflow-x: auto;
            margin-bottom: 30px;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            background: #fff;
        }
        .chart-wrapper {
            position: relative;
            width: 3000px; /* 차트 길이 확보 */
            height: 400px;
        }
        .chart-main {
            position: absolute;
            top: 0; left: 0; width: 3000px; height: 400px; z-index: 1;
        }
        /* Y축 달러 표시가 따라오도록 틀 고정 오버레이 */
        .chart-y-axis-sticky {
            position: sticky;
            top: 0; left: 0; width: 65px; height: 400px; 
            overflow: hidden; z-index: 5; 
            background: rgba(255,255,255,0.95); 
            border-right: 1px dashed #ccc;
            pointer-events: none; /* 마우스 이벤트 무시하여 툴팁 방해 안함 */
        }
        .chart-y-axis-inner {
            position: absolute;
            top: 0; left: 0; width: 3000px; height: 400px;
        }

        /* 입력 영역 */
        .input-area {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }
        .input-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 12px;
            font-weight: bold;
            color: #495057;
            margin-bottom: 5px;
        }
        input {
            padding: 12px 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
        }
        .readonly-input {
            background-color: #e2e6ea;
            color: #c0392b;
            font-weight: bold;
            cursor: not-allowed;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #0b5e71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 30px;
            transition: background 0.2s;
        }
        button:hover { background-color: #084655; }

        /* 테이블 영역 */
        .table-container {
            max-height: 500px;
            overflow-y: auto;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 14px;
        }
        th, td { padding: 12px; border-bottom: 1px solid #dee2e6; }
        th {
            background-color: #0b5e71;
            color: white;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        tr:nth-child(even) { background-color: #f8f9fa; }
        .tax-column { color: #e74c3c; font-weight: bold; }
        .krw-column { color: #27ae60; font-weight: bold; }
        .highlight-current { background-color: #fff3cd !important; font-weight: bold; }
        
    </style>
</head>

        <div id="exchange-rate-info" class="info-text">💱 실시간 환율을 불러오는 중입니다...</div>

            <div class="chart-wrapper">
                <div class="chart-main">
                    <canvas id="myChart"></canvas>
                </div>
                <div class="chart-y-axis-sticky">
                    <div class="chart-y-axis-inner">
                        <canvas id="myChartYAxis"></canvas>
                    </div>
                </div>
            </div>
        </div>
